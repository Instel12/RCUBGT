}

#chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    max-width:70%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    white-space:pre-wrap;
}

.user{
    background:#2a2a2a;
    margin-left:auto;
}

.ai{
    background:#1b3a5f;
}

.note{
    background:#1b5f1d;
}

#inputBar{
    display:flex;
    border-top:1px solid #333;
}

#messageInput{
    flex:1;
    padding:15px;
    border:none;
    background:#111;
    color:white;
    font-size:16px;
}

#sendBtn{
    width:100px;
    border:none;
    background:#3b82f6;
    color:white;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
