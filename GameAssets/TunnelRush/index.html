<html>
  <head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/assets@main/tunnel-rush/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <style>
      body {
    border: 0;
    margin: 0;
    padding: 0;
}

.webgl-content .logo,
.progress {
    position: absolute;
    left: 50%;
    top: 50%;
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
}
.webgl-content .logo {
    background: url("progressLogo.Light.png") no-repeat center / contain;
    width: 154px;
    height: 130px;
}
.webgl-content .progress {
    height: 18px;
    width: 141px;
    margin-top: 90px;
}
.webgl-content .progress .empty {
    background: url("progressEmpty.Light.png") no-repeat right / cover;
    float: right;
    width: 100%;
    height: 100%;
    display: inline-block;
}
.webgl-content .progress .full {
    background: url("progressFull.Light.png") no-repeat left / cover;
    float: left;
    width: 0%;
    height: 100%;
    display: inline-block;
}

.webgl-content .logo.Dark {
    background-image: url("progressLogo.Dark.png");
}
.webgl-content .progress.Dark .empty {
    background-image: url("progressEmpty.Dark.png");
}
.webgl-content .progress.Dark .full {
    background-image: url("progressFull.Dark.png");
}
    </style>
    <script src="UnityLoader.js"></script>
    <script src="UnityProgress.js"></script>
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "build.json", {onProgress: UnityProgress,Module:{onRuntimeInitialized: function() {UnityProgress(gameInstance, "complete")}}});
    </script>
</head>
  <body>
    <div class="webgl-content">
      <div id="gameContainer" style="width: 100%; height: 100%; margin: auto;"></div>
    </div>
</html>

<script src="https://instel12.github.io/RCUBGT/Assets/api/api.js"></script>
