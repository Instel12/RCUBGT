<!DOCTYPE html>
<html lang="en">
    <head>
        <title id="PageTitle">RCUBGT</title>
        <link id="PageIcon" rel="icon">
        <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <!-- This is the html metadata, it doesnt have to do with the page itsself -->
        <span id="auth" style="display: none;">yep, authenticated</span> <!-- dont change this line at all if you dont want an annoying ahh watermark on all of the games -->
        <span id="clientver" style="display: none;">1.2.0</span>
        <span id="singlefilepref" style="display: none;">false</span>
        <!-- ehh, enough of the metadata -->

        <div class="Banner">
            <a onclick="LoadHomepage()">RCUBGT</a>
            <span id="GameOptions">
                <a onclick="fullscreen()">Fullscreen</a>
            </span>
            <span id="MenuOptions">

            </span>
        </div>

        <iframe id="Container"></iframe>
        <div id="particles"></div>

        <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

        <script>
            const localpref = document.getElementById("singlefilepref");

            const css = document.createElement("link");
            const js = document.createElement("script");

            const menuopt = document.getElementById("MenuOptions");

            let finalprefix = "";

            css.rel = "stylesheet";
        
            if (localpref.textContent == "false") {
                finalprefix = "";
                menuopt.innerHTML = `
                <a onclick="window.open('https://discord.gg/5tXfSNbgTa')"><img src="Images/Discord.png"></a>
                <a onclick="window.open('https://github.com/Instel12/RCUBGT/')"><img src="Images/Github.png"></a>
                <a onclick="OpenSettings()"><img src="Images/Settings.png"></a>`
                if (window.location.protocol === "file:") {
                    alert("The HTML's metadata says this is not single file! This is not recommended.")
                }
                if (window.location.protocol === "data,") {
                    alert("Most features cannot load in a 'data,' URL. It is very highly recommended to run this another way.")
                }
            }
            else{
                finalprefix = "https://instel12.github.io/RCUBGT/Assets/";
                menuopt.innerHTML = `
                <a onclick="window.open('https://discord.gg/5tXfSNbgTa')"><img src="https://instel12.github.io/RCUBGT/Assets/Images/Discord.png"></a>
                <a onclick="window.open('https://github.com/Instel12/RCUBGT/')"><img src="https://instel12.github.io/RCUBGT/Assets/Images/Github.png"></a>
                <a onclick="OpenSettings()"><img src="https://instel12.github.io/RCUBGT/Assets/Images/Settings.png"></a>`;
            }

            js.src = finalprefix + "script.js";
            css.href = finalprefix + "style.css";

            document.body.append(js);
            document.head.appendChild(css);
        </script>
    </body>
</html>
